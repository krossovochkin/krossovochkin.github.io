<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date Difference</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --border: #334155;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #6366f1;
    --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 440px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  }
  h1 {
    font-size: 18px;
    margin: 0 0 20px;
    font-weight: 600;
  }
  .fields {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 24px;
  }
  label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  input[type="date"] {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 10px;
    font-size: 14px;
    font-family: inherit;
    color-scheme: dark;
  }
  input[type="date"]:focus {
    outline: none;
    border-color: var(--accent);
  }
  .result {
    background: rgba(99,102,241,0.1);
    border: 1px solid rgba(99,102,241,0.3);
    border-radius: 12px;
    padding: 18px;
    text-align: center;
  }
  .result .big {
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .result .small {
    font-size: 12px;
    color: var(--muted);
    font-family: var(--mono);
  }
  .neg {
    font-size: 11px;
    color: var(--muted);
    margin-top: 8px;
  }
</style>
</head>
<body>
  <div class="card">
    <h1>Date Difference</h1>
    <div class="fields">
      <div>
        <label for="before">Before</label>
        <input type="date" id="before">
      </div>
      <div>
        <label for="after">After</label>
        <input type="date" id="after">
      </div>
    </div>
    <div class="result">
      <div id="big" class="big">—</div>
      <div id="small" class="small">—</div>
    </div>
  </div>

<script>
  const beforeEl = document.getElementById('before');
  const afterEl = document.getElementById('after');
  const bigEl = document.getElementById('big');
  const smallEl = document.getElementById('small');

  function toISO(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }

  function parseDParam(raw) {
    const today = new Date();
    if (/^\d{4}$/.test(raw)) {
      // year only -> today's month/day
      const year = parseInt(raw, 10);
      return new Date(year, today.getMonth(), today.getDate());
    }
    if (/^\d{8}$/.test(raw)) {
      // YYYYMMDD
      const year = parseInt(raw.slice(0, 4), 10);
      const month = parseInt(raw.slice(4, 6), 10) - 1;
      const day = parseInt(raw.slice(6, 8), 10);
      return new Date(year, month, day);
    }
    return null;
  }

  function diffYMD(d1, d2) {
    // ensure d1 <= d2
    let start = d1, end = d2, negative = false;
    if (start > end) { [start, end] = [end, start]; negative = true; }

    let years = end.getFullYear() - start.getFullYear();
    let months = end.getMonth() - start.getMonth();
    let days = end.getDate() - start.getDate();

    if (days < 0) {
      months -= 1;
      const prevMonthLastDay = new Date(end.getFullYear(), end.getMonth(), 0).getDate();
      days += prevMonthLastDay;
    }
    if (months < 0) {
      years -= 1;
      months += 12;
    }

    const totalDays = Math.round((end - start) / (1000 * 60 * 60 * 24));

    return { years, months, days, totalDays, negative };
  }

  function formatPart(value, singular) {
    return `${value} ${singular}${value === 1 ? '' : 's'}`;
  }

  function update() {
    const bVal = beforeEl.value;
    const aVal = afterEl.value;
    if (!bVal || !aVal) {
      bigEl.textContent = '—';
      smallEl.textContent = '—';
      return;
    }
    const d1 = new Date(bVal + 'T00:00:00');
    const d2 = new Date(aVal + 'T00:00:00');

    const { years, months, days, totalDays, negative } = diffYMD(d1, d2);

    const parts = [];
    if (years) parts.push(formatPart(years, 'year'));
    if (months) parts.push(formatPart(months, 'month'));
    if (days || parts.length === 0) parts.push(formatPart(days, 'day'));

    bigEl.textContent = (negative ? '-' : '') + parts.join(', ');
    smallEl.textContent = `${totalDays} total day${totalDays === 1 ? '' : 's'}`;
  }

  // --- init from query params ---
  const params = new URLSearchParams(window.location.search);
  const today = new Date();

  let beforeDate = today;
  if (params.has('d')) {
    const parsed = parseDParam(params.get('d').trim());
    if (parsed) beforeDate = parsed;
  }
  beforeEl.value = toISO(beforeDate);

  let afterDate = today;
  if (params.get('s') === '1') {
    afterDate = new Date(today.getFullYear(), beforeDate.getMonth(), beforeDate.getDate());
  }
  afterEl.value = toISO(afterDate);

  beforeEl.addEventListener('change', update);
  afterEl.addEventListener('change', update);
  update();
</script>
</body>
</html>
